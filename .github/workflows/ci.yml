name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25.12"
          cache: true
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
      - run: task ci

  minimum-go:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Pin the minimum supported toolchain instead of auto-upgrading to the
      # go.mod toolchain line, so this job proves Go 1.25.0 really works.
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25.0"
          cache: true
      - run: go mod download
      - run: go build -mod=readonly ./...
      - run: go build -mod=readonly ./examples/...
      - run: go test -count=1 -mod=readonly ./...

name: Compatibility matrix

on:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: compatibility-matrix
  cancel-in-progress: false

jobs:
  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25.12"
          cache: true

      - name: Run matrix
        id: matrix
        continue-on-error: true
        run: |
          set -o pipefail
          cd validation && GOWORK=off go run -tags=validation ./cmd/matrix -out "$RUNNER_TEMP/support-matrix.md" 2>&1 | tee "$RUNNER_TEMP/matrix.log"

      - name: Publish summary
        if: always()
        run: cat "$RUNNER_TEMP/support-matrix.md" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: Classify outcome
        id: classify
        run: |
          set -euo pipefail
          if [ "${{ steps.matrix.outcome }}" = "success" ]; then
            echo "kind=success" >> "$GITHUB_OUTPUT"
          elif grep -q "matrix has failing cells" "$RUNNER_TEMP/matrix.log"; then
            echo "kind=compatibility" >> "$GITHUB_OUTPUT"
          else
            echo "kind=infrastructure" >> "$GITHUB_OUTPUT"
          fi

      - name: Maintain compatibility issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "Provider-SDK compatibility matrix failing"
          KIND: ${{ steps.classify.outputs.kind }}
        run: |
          set -euo pipefail
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh label create compatibility --force --description "automated compatibility alerts" --color D93F0B 2>/dev/null || true
          # One durable issue resolved by exact title match across all
          # states, independent of label membership; the title is
          # passed only through jq --arg, never interpolated into a
          # program string.
          number=$(gh issue list --state all --limit 500 --json number,title |
            jq -r --arg title "$TITLE" '[.[] | select(.title == $title)][0].number // empty')
          case "$KIND" in
            compatibility)
              body="The weekly compatibility matrix has failing cells. Run: $run_url"
              if [ -n "$number" ]; then
                gh issue reopen "$number" || true
                state=$(gh issue view "$number" --json state --jq .state)
                if [ "$state" != "OPEN" ]; then
                  echo "failed to reopen compatibility issue #$number" >&2
                  exit 1
                fi
                gh issue comment "$number" --body "$body"
              else
                gh issue create --title "$TITLE" --label compatibility --body "$body"
              fi
              ;;
            success)
              if [ -n "$number" ]; then
                state=$(gh issue view "$number" --json state --jq .state)
                if [ "$state" = "OPEN" ]; then
                  gh issue close "$number" --comment "Matrix recovered: $run_url"
                fi
              fi
              ;;
            infrastructure)
              # Discovery or runner failures leave the durable alert
              # untouched; the propagation step still fails the run.
              ;;
          esac

      - name: Propagate failure
        if: always()
        env:
          KIND: ${{ steps.classify.outputs.kind }}
        run: |
          set -euo pipefail
          if [ "$KIND" != "success" ]; then
            echo "matrix outcome: $KIND" >&2
            exit 1
          fi

name: Compatibility matrix

on:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: compatibility-matrix
  cancel-in-progress: false

jobs:
  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25.12"
          cache: true
      - name: Run matrix
        id: matrix
        run: |
          set -o pipefail
          cd validation && GOWORK=off go run -tags=validation ./cmd/matrix -out "$RUNNER_TEMP/support-matrix.md" | tee "$RUNNER_TEMP/matrix.log"
      - name: Publish summary
        if: always()
        run: cat "$RUNNER_TEMP/support-matrix.md" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
      - name: Maintain compatibility issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "Provider-SDK compatibility matrix failing"
        run: |
          set -euo pipefail
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # One durable issue, resolved by exact title across open AND
          # closed states, so regressions reopen rather than duplicate.
          gh label create compatibility --force --description "automated compatibility alerts" --color D93F0B 2>/dev/null || true
          number=$(gh issue list --label compatibility --state all --search ""$TITLE" in:title" --json number,title --jq "[.[] | select(.title == "$TITLE")][0].number // empty")
          case "${{ steps.matrix.outcome }}" in
            failure)
              body="The weekly compatibility matrix has failing cells. Run: $run_url"
              if [ -n "$number" ]; then
                gh issue reopen "$number" 2>/dev/null || true
                gh issue comment "$number" --body "$body"
              else
                gh issue create --title "$TITLE" --label compatibility --body "$body"
              fi
              ;;
            success)
              if [ -n "$number" ]; then
                state=$(gh issue view "$number" --json state --jq .state)
                if [ "$state" = "OPEN" ]; then
                  gh issue close "$number" --comment "Matrix recovered: $run_url"
                fi
              fi
              ;;
            *)
              # Skipped/cancelled/infrastructure outcomes leave the
              # alert untouched.
              ;;
          esac

version: "2"

linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - copyloopvar
    - decorder
    - dogsled
    - durationcheck
    - embeddedstructfieldcheck
    - errcheck
    - errchkjson
    - errname
    - exhaustive
    - exptostd
    - fatcontext
    - forbidigo
    - gocheckcompilerdirectives
    - gochecksumtype
    - gocritic
    - godot
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - loggercheck
    - makezero
    - mirror
    - misspell
    - modernize
    - musttag
    - nakedret
    - nilerr
    - nilnesserr
    - nilnil
    - nosprintfhostport
    - perfsprint
    - predeclared
    - protogetter
    - reassign
    - sloglint
    - spancheck
    - staticcheck
    - tagliatelle
    - thelper
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace

  settings:
    embeddedstructfieldcheck:
      empty-line: false
    exhaustive:
      default-signifies-exhaustive: true
    staticcheck:
      checks:
        - all
        - -ST1001
    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake
        use-field-name: true

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - bodyclose
          - forbidigo
        path: (.+)_test\.go
      # Example programs print their observable results to stdout.
      - linters:
          - forbidigo
        path: examples/
      # Wire tests intentionally use raw headers/protobuf fields, while some
      # test helpers keep generic parameters to make assertions readable.
      - linters:
          - canonicalheader
          - protogetter
          - unparam
        path: (.+)_test\.go
      - linters:
          - spancheck
        path: internal/processor/processor_test\.go
      - linters:
          - staticcheck
        path: client_contract_test\.go
        text: SA1012
      - linters:
          - usetesting
        path: client_contract_test\.go
    paths:
      - third_party$
      - builtin$
      - ref$

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - ref$

# https://taskfile.dev
version: "3"

vars:
  GOLANGCI_LINT_VERSION: 2.9.0
  GOVULNCHECK_VERSION: 1.1.4

tasks:
  install:golangci-lint:
    internal: true
    status:
      - test -x ./bin/golangci-lint
      - ./bin/golangci-lint --version | grep -F 'version {{.GOLANGCI_LINT_VERSION}}'
    cmds:
      - mkdir -p ./bin
      - >-
        curl -sSfL
        https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh
        | sh -s -- -b ./bin v{{.GOLANGCI_LINT_VERSION}}

  format:
    desc: Format Go sources and module files
    deps: [install:golangci-lint]
    cmds:
      - ./bin/golangci-lint fmt
      - go mod edit -fmt
      - go mod tidy

  format:check:
    desc: Check Go source formatting and module tidiness
    deps: [install:golangci-lint]
    cmds:
      - ./bin/golangci-lint fmt --diff
      - go mod tidy -diff

  lint:
    desc: Run Go linters
    deps: [install:golangci-lint]
    cmds:
      - ./bin/golangci-lint run --timeout 2m

  test:
    desc: Run the race-enabled test suite
    cmds:
      - go test -race -mod=readonly {{.CLI_ARGS | default "./..."}}

  build:
    desc: Compile examples and the opt-in live test suite
    cmds:
      - go build -mod=readonly ./examples/...
      - go test -tags=live -run='^$' -mod=readonly ./...

  readme:check:
    desc: Compile the standalone README quickstart
    cmds:
      - ./scripts/check-readme-quickstart.sh

  fuzz:check:
    desc: Run short fuzz smoke tests
    cmds:
      - go test -mod=readonly ./internal/attributes -run='^$' -fuzz=FuzzEncode -fuzztime=2s
      - go test -mod=readonly ./internal/attributes -run='^$' -fuzz=FuzzNormalizeUsage -fuzztime=2s
      - go test -mod=readonly ./internal/transport -run='^$' -fuzz=FuzzNormalizeEndpoint -fuzztime=2s
      - go test -mod=readonly . -run='^$' -fuzz=FuzzPromptCompile -fuzztime=2s

  vuln:check:
    desc: Scan dependencies for known vulnerabilities
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@v{{.GOVULNCHECK_VERSION}} ./...

  policy:check:
    desc: Check repository and module policy
    cmds:
      - test -f LICENSE
      - grep -q "Apache License" LICENSE
      - test "$(go mod edit -json | jq -r .Go)" = "1.25.0"
      - test "$(go mod edit -json | jq -r .Toolchain)" = "go1.25.12"

  contrib:sync:
    desc: Mirror the wiretap package from contrib/openai into contrib/googlegenai
    cmds:
      - cp contrib/openai/internal/wiretap/*.go contrib/googlegenai/internal/wiretap/

  contrib:sync:check:
    desc: Verify the mirrored wiretap copies and their shared dependency versions are identical
    cmds:
      - diff -r contrib/openai/internal/wiretap contrib/googlegenai/internal/wiretap
      - bash -c "diff <(grep -oE '(github.com/fgn/go-langfuse|go.opentelemetry.io/otel|go.opentelemetry.io/otel/trace) v[0-9.]+' contrib/openai/go.mod | sort) <(grep -oE '(github.com/fgn/go-langfuse|go.opentelemetry.io/otel|go.opentelemetry.io/otel/trace) v[0-9.]+' contrib/googlegenai/go.mod | sort)"

  contrib:test:
    desc: Lint and test the contrib and integration-test modules
    deps: [install:golangci-lint]
    cmds:
      - cd contrib/openai && ../../bin/golangci-lint run --timeout 2m && go vet ./... && go test -race ./...
      - cd contrib/googlegenai && ../../bin/golangci-lint run --timeout 2m && go vet ./... && go test -race ./...
      - cd contrib/openai && go test ./internal/wiretap -run='^$' -fuzz=FuzzSSEFramer -fuzztime=2s
      - cd contrib/googlegenai && go test ./internal/wiretap -run='^$' -fuzz=FuzzSSEFramer -fuzztime=2s
      - cd contrib/integrationtest && go vet ./... && go test -race ./...

  contrib:purity:check:
    desc: Verify contrib modules against the released core without the workspace and without provider SDKs
    vars:
      PROVIDER_SDKS: sashabaranov|github.com/openai/|google.golang.org/genai|cloud.google.com
    cmds:
      - cd contrib/openai && GOWORK=off go mod tidy -diff && GOWORK=off go test -count=1 -mod=readonly ./...
      - cd contrib/googlegenai && GOWORK=off go mod tidy -diff && GOWORK=off go test -count=1 -mod=readonly ./...
      - "! grep -E '{{.PROVIDER_SDKS}}' contrib/openai/go.mod contrib/openai/go.sum contrib/googlegenai/go.mod contrib/googlegenai/go.sum"
      - cd contrib/openai && GOWORK=off go list -deps ./... | (! grep -E '{{.PROVIDER_SDKS}}')
      - cd contrib/googlegenai && GOWORK=off go list -deps ./... | (! grep -E '{{.PROVIDER_SDKS}}')

  validate:
    desc: Real-provider validation (slow, credentialed, six inference calls; never part of ci)
    cmds:
      - cd validation && GOWORK=off go test -tags=validation -count=1 -v -timeout=15m ./...

  parity:
    desc: Cross-SDK parity against the committed snapshot (credentialed, one inference call)
    cmds:
      - cd validation && GOWORK=off go test -tags="validation parity" -count=1 -v -timeout=10m -run 'TestParityAzure|TestCanonicalizerFixtures' .

  parity:regen:
    desc: Regenerate the parity golden (requires uv, Azure and Langfuse credentials; ACCEPT=accept to replace)
    cmds:
      - |
        marker="parity-$(date +%s%N)"
        tid=$(cd validation/parity && uv run --locked python log_call.py "$marker")
        echo "python trace: $tid"
        cd validation && PARITY_PYTHON_TRACE="$tid" PARITY_REGEN="${ACCEPT:-diff}" GOWORK=off go test -tags="validation parity" -count=1 -v -run TestParityRegen .

  matrix:
    desc: Regenerate the provider-SDK transport compatibility matrix (credential-free)
    cmds:
      - cd validation && GOWORK=off go run -tags=validation ./cmd/matrix -out ../docs/support-matrix.md

  interop:
    desc: Baggage interop corpus against the uv-locked Python oracle (credential-free; ACCEPT=accept to reseal)
    cmds:
      - cd validation && INTEROP_REGEN="{{.ACCEPT}}" GOWORK=off go test -tags=interop -count=1 -timeout=10m -run 'TestInterop' .

  ci:
    desc: Run all continuous-integration checks
    cmds:
      - go mod download
      - task: format:check
      - task: lint
      - task: readme:check
      - task: build
      - task: test
      - go vet -mod=readonly ./...
      - task: fuzz:check
      - task: contrib:sync:check
      - task: contrib:test
      - task: contrib:purity:check
      - task: interop
      - task: vuln:check
      - task: policy:check

  default:
    cmds:
      - task: ci
